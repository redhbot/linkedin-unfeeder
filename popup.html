<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 220px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-align: center;
      margin: 0;
    }
    h3 {
      margin: 0 0 12px;
      font-size: 14px;
      color: #333;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button.on {
      background: #0A66C2;
      color: #fff;
    }
    button.off {
      background: #e0e0e0;
      color: #333;
    }
    button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <h3>LinkedIn Unfeeder</h3>
  <button id="toggle"></button>
  <script src="popup.js"></script>
</body>
</html>
